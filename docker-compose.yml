services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ais
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ${PGDATA_PATH:-./pgdata}:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ais_v2

      # added localhost:3000 for quick frontend dev
      - CORS_ORIGINS=http://localhost,http://localhost:3000,http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

    # temporarily add ports to allow connection to local dev server
    ports:
      - "8000:8000"


  frontend:
    build:
      context: ./frontend
      args:
        VITE_STADIA_KEY: ${VITE_STADIA_KEY}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
